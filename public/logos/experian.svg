<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <!-- Experian official logo - navy wordmark with colored rounded squares -->

  <!-- Colored squares arrangement (left side) -->
  <!-- Top-left: purple -->
  <rect x="2" y="28" width="18" height="18" rx="4" fill="#6B2574"/>
  <!-- Top-middle: blue -->
  <rect x="24" y="6" width="18" height="18" rx="4" fill="#5F82B9"/>
  <!-- Top-right: magenta -->
  <rect x="46" y="16" width="14" height="14" rx="3" fill="#C5197D"/>
  <!-- Bottom-left: magenta -->
  <rect x="24" y="50" width="18" height="18" rx="4" fill="#C5197D"/>

  <!-- "experian" wordmark (all lowercase) -->
  <text x="68" y="60" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="700" font-size="52" fill="#1D2C5E" letter-spacing="-0.5">experian</text>

  <!-- Trademark -->
  <text x="306" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1D2C5E">TM</text>
</svg>
